name: Upstream Vim Tests

on:
  workflow_dispatch:

concurrency:
  group: upstream-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  VIM_CORE_FROM_SOURCE: "1"

jobs:
  upstream-tests:
    name: Upstream Vim Tests (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Generate vendored Vim sources
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/vendor-sync.sh apply

      - name: Run upstream Vim generated tests
        shell: bash
        run: |
          set -euo pipefail
          cargo test --test upstream_vim_generated
