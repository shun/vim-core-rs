name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  VIM_CORE_FROM_SOURCE: "1"

jobs:
  checks:
    name: Checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Generate vendored Vim sources
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/vendor-sync.sh apply

      - name: Run formatting check
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --check

      - name: Run clippy
        shell: bash
        run: |
          set -euo pipefail
          cargo clippy --all-targets -- -D warnings

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          cargo test
