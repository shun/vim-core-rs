name: Release Crate

on:
  workflow_dispatch:
    inputs:
      vim_version:
        description: 'Upstream Vim tag to vendor (example: v9.2.0131)'
        required: true
        type: string
      crate_version:
        description: 'Crate version to publish (example: 0.2.0)'
        required: true
        type: string
      publish:
        description: 'Publish to crates.io after approval'
        required: true
        type: boolean
        default: false

concurrency:
  group: release-crate-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare Inputs
    runs-on: ubuntu-latest
    outputs:
      vim_version: ${{ steps.validate.outputs.vim_version }}
      crate_version: ${{ steps.validate.outputs.crate_version }}
      publish: ${{ steps.validate.outputs.publish }}
      artifact_name: ${{ steps.validate.outputs.artifact_name }}
    steps:
      - name: Validate workflow inputs
        id: validate
        shell: bash
        run: |
          set -euo pipefail

          vim_version='${{ inputs.vim_version }}'
          crate_version='${{ inputs.crate_version }}'
          publish='${{ inputs.publish }}'

          if [[ ! "$vim_version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "vim_version must match vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi

          if [[ ! "$crate_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$ ]]; then
            echo "crate_version must be a valid semver-like version" >&2
            exit 1
          fi

          artifact_name="release-workspace-${vim_version}-${crate_version}"

          {
            echo "vim_version=$vim_version"
            echo "crate_version=$crate_version"
            echo "publish=$publish"
            echo "artifact_name=$artifact_name"
          } >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          {
            echo "## Release Parameters"
            echo ""
            echo "- Vim version: \`${{ steps.validate.outputs.vim_version }}\`"
            echo "- Crate version: \`${{ steps.validate.outputs.crate_version }}\`"
            echo "- Publish enabled: \`${{ steps.validate.outputs.publish }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  update_upstream:
    name: Update Upstream
    runs-on: ubuntu-latest
    needs: prepare
    outputs:
      artifact_name: ${{ needs.prepare.outputs.artifact_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Update vendored Vim and crate version
        shell: bash
        run: |
          set -euo pipefail

          ./scripts/vendor-sync.sh update '${{ needs.prepare.outputs.vim_version }}'

          perl -0pi -e 's/^version = ".*?"$/version = "${{ needs.prepare.outputs.crate_version }}"/m' Cargo.toml

          cargo metadata --no-deps >/dev/null

      - name: Show resulting versions
        shell: bash
        run: |
          set -euo pipefail
          echo "Updated upstream metadata:"
          cat upstream-metadata.json
          echo
          echo "Cargo.toml version:"
          sed -n '1,12p' Cargo.toml

      - name: Archive prepared workspace
        shell: bash
        run: |
          set -euo pipefail
          tar \
            --exclude=.git \
            --exclude=target \
            -czf workspace.tar.gz \
            .

      - name: Upload prepared workspace
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.artifact_name }}
          path: workspace.tar.gz
          if-no-files-found: error

      - name: Summary
        run: |
          {
            echo "## Upstream Update"
            echo ""
            echo "- Vendored Vim: \`${{ needs.prepare.outputs.vim_version }}\`"
            echo "- Crate version set to: \`${{ needs.prepare.outputs.crate_version }}\`"
            echo "- Workspace artifact: \`${{ needs.prepare.outputs.artifact_name }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  verify:
    name: Verify
    needs:
      - prepare
      - update_upstream
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Download prepared workspace
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.artifact_name }}

      - name: Extract workspace
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf workspace.tar.gz

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Run checks
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test

  package_check:
    name: Package Check
    runs-on: ubuntu-latest
    needs:
      - prepare
      - update_upstream
      - verify
    steps:
      - name: Download prepared workspace
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.artifact_name }}

      - name: Extract workspace
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf workspace.tar.gz

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo package dry run
        shell: bash
        run: |
          set -euo pipefail
          cargo package --allow-dirty
          cargo publish --dry-run --allow-dirty

      - name: Summary
        run: |
          {
            echo "## Package Check"
            echo ""
            echo "- cargo package --allow-dirty: passed"
            echo "- cargo publish --dry-run --allow-dirty: passed"
          } >> "$GITHUB_STEP_SUMMARY"

  approval_gate:
    name: Approval Gate
    runs-on: ubuntu-latest
    needs:
      - prepare
      - package_check
    if: needs.prepare.outputs.publish == 'true'
    environment:
      name: crates-io-publish
    steps:
      - name: Await manual approval
        run: |
          echo "Manual approval granted for Vim ${{ needs.prepare.outputs.vim_version }} and crate ${{ needs.prepare.outputs.crate_version }}."

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - prepare
      - approval_gate
    if: needs.prepare.outputs.publish == 'true'
    permissions:
      contents: read
    environment:
      name: crates-io-publish
    steps:
      - name: Download prepared workspace
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.artifact_name }}

      - name: Extract workspace
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf workspace.tar.gz

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          cargo publish --allow-dirty

      - name: Summary
        run: |
          {
            echo "## Publish"
            echo ""
            echo "- Published crate version: \`${{ needs.prepare.outputs.crate_version }}\`"
            echo "- Vendored Vim version: \`${{ needs.prepare.outputs.vim_version }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
