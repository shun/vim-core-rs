name: Release Crate

on:
  workflow_dispatch:
    inputs:
      vim_version:
        description: 'Upstream Vim tag to vendor (example: v9.2.0131)'
        required: true
        type: string
      crate_version:
        description: 'Crate version to publish (example: 0.2.0)'
        required: true
        type: string
      publish:
        description: 'Publish to crates.io and GitHub Releases after approval'
        required: true
        type: boolean
        default: false

concurrency:
  group: release-crate-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  VIM_CORE_FROM_SOURCE: "1"

jobs:
  prepare:
    name: Prepare Inputs
    runs-on: ubuntu-latest
    outputs:
      vim_version: ${{ steps.validate.outputs.vim_version }}
      crate_version: ${{ steps.validate.outputs.crate_version }}
      publish: ${{ steps.validate.outputs.publish }}
      artifact_name: ${{ steps.validate.outputs.artifact_name }}
      release_tag: ${{ steps.validate.outputs.release_tag }}
    steps:
      - name: Validate workflow inputs
        id: validate
        shell: bash
        run: |
          set -euo pipefail

          vim_version='${{ inputs.vim_version }}'
          crate_version='${{ inputs.crate_version }}'
          publish='${{ inputs.publish }}'

          if [[ ! "$vim_version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "vim_version must match vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi

          if [[ ! "$crate_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$ ]]; then
            echo "crate_version must be a valid semver-like version" >&2
            exit 1
          fi

          artifact_name="release-workspace-${vim_version}-${crate_version}"
          release_tag="v${crate_version}"

          {
            echo "vim_version=$vim_version"
            echo "crate_version=$crate_version"
            echo "publish=$publish"
            echo "artifact_name=$artifact_name"
            echo "release_tag=$release_tag"
          } >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          {
            echo "## Release parameters"
            echo ""
            echo "- Vim version: \`${{ steps.validate.outputs.vim_version }}\`"
            echo "- Crate version: \`${{ steps.validate.outputs.crate_version }}\`"
            echo "- Publish enabled: \`${{ steps.validate.outputs.publish }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  update_upstream:
    name: Update upstream
    runs-on: ubuntu-latest
    needs: prepare
    outputs:
      artifact_name: ${{ needs.prepare.outputs.artifact_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Update vendored Vim and crate version
        shell: bash
        run: |
          set -euo pipefail

          ./scripts/vendor-sync.sh update '${{ needs.prepare.outputs.vim_version }}'
          perl -0pi -e 's/^version = ".*?"$/version = "${{ needs.prepare.outputs.crate_version }}"/m' Cargo.toml
          cargo metadata --no-deps >/dev/null

      - name: Archive prepared workspace
        shell: bash
        run: |
          set -euo pipefail
          tar \
            --exclude=.git \
            --exclude=target \
            -czf workspace.tar.gz \
            .

      - name: Upload prepared workspace
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.artifact_name }}
          path: workspace.tar.gz
          if-no-files-found: error

  verify_source:
    name: Verify source build (${{ matrix.name }})
    needs:
      - prepare
      - update_upstream
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
          - name: Linux
            os: ubuntu-latest
    steps:
      - name: Download prepared workspace
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.artifact_name }}

      - name: Extract workspace
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf workspace.tar.gz

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Run checks
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test

  package_prebuilt:
    name: Package prebuilt artifact (${{ matrix.target }})
    needs:
      - prepare
      - update_upstream
      - verify_source
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - name: Download prepared workspace
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.artifact_name }}

      - name: Extract workspace
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf workspace.tar.gz

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release artifact from source
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release -vv

      - name: Locate build output
        id: build_out
        shell: bash
        run: |
          set -euo pipefail
          out_dir="$(find target/release/build -path '*/out/libvimcore.a' -print | head -n1 | xargs dirname)"
          if [[ -z "$out_dir" ]]; then
            echo "failed to locate build out dir" >&2
            exit 1
          fi
          echo "out_dir=$out_dir" >> "$GITHUB_OUTPUT"

      - name: Package prebuilt archive
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./scripts/package-prebuilt-artifact.sh
          ./scripts/package-prebuilt-artifact.sh \
            '${{ steps.build_out.outputs.out_dir }}' \
            '${{ needs.prepare.outputs.crate_version }}' \
            '${{ matrix.target }}' \
            dist

      - name: Upload packaged prebuilt archive
        uses: actions/upload-artifact@v4
        with:
          name: prebuilt-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  verify_prebuilt:
    name: Verify prebuilt consumer build (${{ matrix.target }})
    needs:
      - prepare
      - update_upstream
      - package_prebuilt
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - name: Download prepared workspace
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.artifact_name }}

      - name: Download packaged prebuilt archive
        uses: actions/download-artifact@v4
        with:
          name: prebuilt-${{ matrix.target }}
          path: local-prebuilt

      - name: Extract workspace
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf workspace.tar.gz

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify clean prebuilt build
        env:
          VIM_CORE_ARTIFACT_BASE_URL: ${{ github.workspace }}/local-prebuilt
          VIM_CORE_FROM_SOURCE: "0"
        shell: bash
        run: |
          set -euo pipefail
          cargo clean
          cargo build --release -vv

  package_check:
    name: Package check
    runs-on: ubuntu-latest
    needs:
      - prepare
      - update_upstream
      - verify_prebuilt
    steps:
      - name: Download prepared workspace
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.artifact_name }}

      - name: Extract workspace
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf workspace.tar.gz

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo package dry run
        shell: bash
        run: |
          set -euo pipefail
          cargo package --allow-dirty
          cargo publish --dry-run --allow-dirty

  approval_gate:
    name: Approval gate
    runs-on: ubuntu-latest
    needs:
      - prepare
      - package_check
    if: needs.prepare.outputs.publish == 'true'
    environment:
      name: crates-io-publish
    steps:
      - name: Await manual approval
        run: |
          echo "Manual approval granted for Vim ${{ needs.prepare.outputs.vim_version }} and crate ${{ needs.prepare.outputs.crate_version }}."

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - prepare
      - approval_gate
    if: needs.prepare.outputs.publish == 'true'
    environment:
      name: crates-io-publish
    steps:
      - name: Download prepared workspace
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.artifact_name }}

      - name: Extract workspace
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf workspace.tar.gz

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          cargo publish --allow-dirty

  publish_prebuilt_release:
    name: Publish prebuilt release assets
    runs-on: ubuntu-latest
    needs:
      - prepare
      - approval_gate
      - package_prebuilt
    if: needs.prepare.outputs.publish == 'true'
    steps:
      - name: Download packaged macOS archive
        uses: actions/download-artifact@v4
        with:
          name: prebuilt-aarch64-apple-darwin
          path: release-assets

      - name: Download packaged Linux archive
        uses: actions/download-artifact@v4
        with:
          name: prebuilt-x86_64-unknown-linux-gnu
          path: release-assets

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true
